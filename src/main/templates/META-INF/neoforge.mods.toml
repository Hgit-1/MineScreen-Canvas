modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}

MineScreen uses Montoyo's public-domain WebDisplays 1.12.2 behavior as its feature reference while retaining the MineScreen name, mod id, resource namespace, saved configuration identity, and extension modes. Its primary compatibility target includes joined web screens, screen configuration, keyboards, linkers, laser input, MinePad-like devices, upgrades, controllers, ownership, and multiplayer synchronization.

VIDEO, VNC, audio, and peer distribution remain MineScreen extension features. Multiplayer servers persist authoritative screen/peripheral state but never relay decoded media frames.'''

[[mixins]]
config="minescreen.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="mcef"
type="required"
versionRange="[2.1.6,)"
ordering="AFTER"
side="CLIENT"
