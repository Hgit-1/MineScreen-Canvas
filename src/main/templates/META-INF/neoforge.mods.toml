modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="minescreen.png"
authors="${mod_authors}"
description='''${mod_description}

MineScreen is an independent implementation. WebDisplays is acknowledged separately for its historical contribution to in-world web displays; it is not a compatibility target or replacement identity.

Multiplayer servers persist authoritative screen/peripheral state but never relay decoded media frames.'''

[[mixins]]
config="minescreen.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="mcef"
type="required"
versionRange="[2.1.6,)"
ordering="AFTER"
side="CLIENT"
