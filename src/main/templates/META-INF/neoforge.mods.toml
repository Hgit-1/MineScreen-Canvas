modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}

Join adjacent screen blocks into high-resolution world canvases, then display tabbed MCEF web pages, local FFmpeg video with positional audio, or interactive RFB/VNC desktops. The crosshair is the only world-screen pointer; handheld/fixed keyboards and cable-linked host computers provide explicit text input and preview control.

MineScreen is a client media renderer with an optional matching server installation. Multiplayer servers persist and synchronize screen metadata, playback state, permissions, volume, and optional peer endpoints, but never relay decoded video, browser, VNC framebuffer, audio, player input, local path, or credential data. Optional WEB peer distribution sends compressed frames directly between players. Multiple players may control the same source concurrently by default.'''

[[mixins]]
config="minescreen.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="mcef"
type="required"
versionRange="[2.1.6,)"
ordering="AFTER"
side="CLIENT"
